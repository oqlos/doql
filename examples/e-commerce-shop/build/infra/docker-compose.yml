# Generated by doql build for E-Commerce Shop
services:

  api:
    build:
      context: ../api
      dockerfile: ../infra/Dockerfile
    container_name: e-commerce-shop-api
    restart: unless-stopped
    env_file: .env.docker
    ports:
      - '8000:8000'
    volumes:
      - data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.e-commerce-shop.rule=Host(`env.DOMAIN`)"
      - "traefik.http.routers.e-commerce-shop.tls.certresolver=letsencrypt"
      - "traefik.http.services.e-commerce-shop.loadbalancer.server.port=8000"

  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=ops@example.com
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt

volumes:
  data:
  letsencrypt:
