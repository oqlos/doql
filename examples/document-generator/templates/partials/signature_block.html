<!-- doql TEMPLATE: signature_block -->
<div class="signature-block">
  <div class="signature-row">
    <div class="sig-col">
      <p class="sig-label">Performed by:</p>
      <p class="sig-name">{{ performed_by }}</p>
      <div class="sig-line"></div>
    </div>
    <div class="sig-col">
      <p class="sig-label">Reviewed by:</p>
      <p class="sig-name">{{ reviewed_by }}</p>
      <div class="sig-line"></div>
    </div>
  </div>
  <p class="sig-date">Date: {{ date }}</p>
</div>
