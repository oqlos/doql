version: '3'
name: kiosk-station
description: Inspection Kiosk Station - Tablet Kiosk Interface
variables:
  APP_NAME: kiosk-station
  DOQL_ROOT: ../../
environments:
  local:
    container_runtime: docker
    compose_command: docker compose
tasks:
  validate:
    desc: Validate DOQL DSL files
    cmds:
      - echo "Validating DOQL files..."
      - doql validate -f app.doql.less
      - echo "Validation complete"
  
  plan:
    desc: Show build plan
    cmds:
      - doql plan -f app.doql.less
  
  build:
    desc: Generate code from DOQL (api, kiosk, infra)
    cmds:
      - echo "Generating code from DOQL..."
      - doql build -f app.doql.less
      - echo "Build complete"
  
  sync:
    desc: Merge-friendly sync (preserves custom code)
    cmds:
      - doql sync -f app.doql.less

  pyqual:
    desc: Run quality gate checks via pyqual
    cmds:
      - bash -c 'source /home/tom/github/oqlos/venv/bin/activate && pyqual run'
  
  run-api:
    desc: Run API target
    cmds:
      - doql run -t api
  
  run-kiosk:
    desc: Run kiosk target
    cmds:
      - doql run -t kiosk
  
  run:
    desc: Run full stack (docker-compose)
    cmds:
      - doql run
  
  deploy:
    desc: Deploy kiosk appliance
    cmds:
      - echo "Deploying application..."
      - doql deploy --env prod
      - echo "Deployment complete"
  
  clean:
    desc: Clean build artifacts
    cmds:
      - echo "Cleaning build artifacts..."
      - rm -rf build/
      - echo "Clean complete"
  
  help:
    desc: Show available tasks
    cmds:
      - echo "kiosk-station — available tasks:"
      - echo ""
      - echo "DOQL operations:"
      - echo "  validate    - Validate DOQL files"
      - echo "  plan        - Show build plan"
      - echo "  build       - Generate all code"
      - echo "  sync        - Merge-friendly sync"
      - echo ""
      - echo "Run targets:"
      - echo "  run-api     - Run API"
      - echo "  run-kiosk   - Run kiosk"
      - echo "  run         - Run full stack"
      - echo ""
      - echo "Operations:"
      - echo "  deploy      - Deploy to production"
      - echo "  clean       - Clean build artifacts"
