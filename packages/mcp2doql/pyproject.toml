[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mcp2doql"
version = "0.1.0"
description = "MCP server for DOQL control (query, patch, validate, DSL)"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "doql>=1.0.0",
    "dsl2doql>=0.1.0",
    "uri2doql>=0.1.0",
    "nlp2doql>=0.1.0",
    "mcp>=1.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
mcp2doql = "mcp2doql.cli:main"
mcp2doql-mcp = "mcp2doql.server:run_server"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
