# Reuses existing dev-traefik on dev_oqlos-net (port 80 already busy).
# Run from build/infra/:
#   docker compose -f docker-compose.localhost.yml up -d --build
# Then open: http://asset.localhost/docs
services:
  api:
    build:
      context: ../api
      dockerfile: ../infra/Dockerfile
    container_name: doql-asset-api
    restart: unless-stopped
    environment:
      JWT_SECRET: dev-secret
      DATABASE_URL: sqlite:///./data/app.db
    volumes:
      - data:/app/data
    networks:
      - dev_oqlos-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dev_oqlos-net"
      - "traefik.http.routers.doql-asset.rule=Host(`asset.localhost`)"
      - "traefik.http.routers.doql-asset.entrypoints=web"
      - "traefik.http.services.doql-asset.loadbalancer.server.port=8000"

volumes:
  data:

networks:
  dev_oqlos-net:
    external: true
