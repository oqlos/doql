[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nlp2doql"
version = "0.1.0"
description = "Natural language → DOQL (.doql.less) specification generator"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "doql>=1.0.0",
]

[project.optional-dependencies]
llm = ["litellm>=1.0"]
mcp = ["mcp>=1.0"]
dev = ["pytest>=8.0"]

[project.scripts]
nlp2doql = "nlp2doql.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
