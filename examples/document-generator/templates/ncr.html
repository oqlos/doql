<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Non-Conformance Report — {{ instrument.serial }}</title>
  <style>
    body { font-family: Inter, sans-serif; margin: 2cm; }
    h1 { color: #c0392b; }
    .deviations { border-collapse: collapse; width: 100%; }
    .deviations th, .deviations td { border: 1px solid #333; padding: 8px; }
    .deviations th { background: #f5f5f5; }
  </style>
</head>
<body>
  <h1>Non-Conformance Report</h1>
  <p><strong>Instrument:</strong> {{ instrument.serial }} — {{ instrument.model }}</p>
  <p><strong>Date:</strong> {{ date }}</p>

  <h2>Deviations</h2>
  <table class="deviations">
    <thead><tr><th>Parameter</th><th>Expected</th><th>Actual</th><th>Severity</th></tr></thead>
    <tbody>
      {% for d in deviations %}
      <tr>
        <td>{{ d.parameter }}</td>
        <td>{{ d.expected }}</td>
        <td>{{ d.actual }}</td>
        <td>{{ d.severity }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
