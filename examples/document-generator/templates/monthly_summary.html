<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Monthly Calibration Summary — {{ month }}</title>
  <style>
    body { font-family: Inter, sans-serif; margin: 2cm; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f0f0f0; }
    .metric { font-size: 2em; font-weight: bold; color: #2c3e50; }
  </style>
</head>
<body>
  <h1>Monthly Calibration Summary</h1>
  <p>Period: {{ month }}</p>

  <h2>Overview</h2>
  <p>Certificates issued: <span class="metric">{{ certificates_issued }}</span></p>
  <p>Failure rate: <span class="metric">{{ failure_rate | round(2) }}%</span></p>

  <h2>By Category</h2>
  <table>
    <thead><tr><th>Category</th><th>Count</th></tr></thead>
    <tbody>
      {% for cat in by_category %}
      <tr><td>{{ cat.name }}</td><td>{{ cat.count }}</td></tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
