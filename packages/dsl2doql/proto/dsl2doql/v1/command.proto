syntax = "proto3";
package dsl2doql.v1;

message QueryCommand {
  string target = 1;
  string file = 2;
  string format = 3;
}

message ValidateCommand {
  string path = 1;
}

message ResolveCommand {
  string text = 1;
  string file = 2;
}

message PatchCommand {
  string target = 1;
  string with_path = 2;
  string file = 3;
}

message GenerateCommand {
  string text = 1;
  string out = 2;
}

message AdoptCommand {
  string root = 1;
  string out = 2;
}

message MaterializeCommand {
  string target = 1;
  string dest = 2;
  string file = 3;
}

message ConvertCommand {
  string source = 1;
  string out = 2;
}

message DslEnvelope {
  string verb = 1;
  oneof body {
    QueryCommand query = 10;
    ValidateCommand validate = 11;
    ResolveCommand resolve = 12;
    PatchCommand patch = 13;
    GenerateCommand generate = 14;
    AdoptCommand adopt = 15;
    MaterializeCommand materialize = 16;
    ConvertCommand convert = 17;
  }
  string default_file = 20;
  string correlation_id = 21;
}
