# Generated by doql build — GitLab CI
image: python:3.12-slim

stages:
  - validate
  - build
  - test
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

validate:
  stage: validate
  script:
    - pip install doql
    - doql validate
  only:
    - main
    - develop
    - merge_requests

build:
  stage: build
  needs: [validate]
  script:
    - pip install doql
    - doql build --force
  artifacts:
    paths:
      - build/
    expire_in: 1 hour

api-test:
  stage: test
  needs: [build]
  image: python:3.12-slim
  script:
    - cd build/api
    - pip install -r requirements.txt || true
    - python -c "from main import app; print('API import OK')"

web-build:
  stage: test
  needs: [build]
  image: node:20-slim
  script:
    - cd build/web
    - npm install || true
    - npm run build || true

deploy:
  stage: deploy
  needs: [api-test, web-build]
  script:
    - echo "Deploy doql"
  when: manual
