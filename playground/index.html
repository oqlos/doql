<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>doql Playground</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header>
    <h1>
      <span class="logo">doql</span>
      <span class="tag">playground</span>
    </h1>
    <div class="toolbar">
      <select id="example-picker" aria-label="Load example">
        <option value="">— Load example —</option>
        <option value="minimal">minimal</option>
        <option value="saas">saas-multi-tenant</option>
        <option value="calibration">calibration-lab</option>
        <option value="iot">iot-fleet</option>
      </select>
      <button id="btn-build" disabled>Build</button>
      <span id="status" class="status-loading">Loading Pyodide…</span>
    </div>
  </header>

  <main class="split">
    <section class="editor-pane">
      <div class="pane-header">
        <h2>app.doql</h2>
        <span id="editor-stats"></span>
      </div>
      <textarea id="editor" spellcheck="false" autocapitalize="off">APP: "My App"
VERSION: "1.0.0"
DOMAIN: "demo.local"

ENTITY User:
  id: uuid! auto
  email: string! unique
  name: string!
  role: enum[admin, member]
  created: datetime auto

ENTITY Task:
  id: uuid! auto
  title: string!
  owner: User ref
  due_date: date
  done: bool default=false

INTERFACE api:
  type: rest
  auth: jwt

INTERFACE web:
  type: spa
  framework: react
</textarea>
    </section>

    <section class="output-pane">
      <div class="pane-header tabs">
        <button data-tab="diagnostics" class="tab-active">Diagnostics</button>
        <button data-tab="ast">AST</button>
        <button data-tab="files">Generated files</button>
        <button data-tab="models">models.py</button>
        <button data-tab="schemas">schemas.py</button>
        <button data-tab="env">.env</button>
      </div>
      <div id="tab-diagnostics" class="tab-pane tab-active">
        <div id="diagnostics" class="diagnostics">
          <em>Type or load an example, then press <kbd>Build</kbd>.</em>
        </div>
      </div>
      <div id="tab-ast" class="tab-pane"><pre id="ast-view"></pre></div>
      <div id="tab-files" class="tab-pane"><ul id="files-list"></ul></div>
      <div id="tab-models" class="tab-pane"><pre id="models-view"></pre></div>
      <div id="tab-schemas" class="tab-pane"><pre id="schemas-view"></pre></div>
      <div id="tab-env" class="tab-pane"><pre id="env-view"></pre></div>
    </section>
  </main>

  <footer>
    <span>100% client-side — powered by
      <a href="https://pyodide.org" target="_blank" rel="noopener">Pyodide</a>.
      Your code never leaves the browser.
    </span>
    <span class="version">doql playground · <span id="doql-version">…</span></span>
  </footer>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"></script>
  <script src="./app.js"></script>
</body>
</html>
