pipeline:
  name: doql-example-quality
  
  # Quality gates (disabled for DSL files)
  # metrics:
  #   cc_max: 20
  #   coverage_min: 70
    
  stages:
    - name: validate-doql
      run: bash -c 'source /home/tom/github/oqlos/venv/bin/activate && doql -d . -f app.doql.less validate'
      when: always
      
    - name: plan-build
      run: bash -c 'source /home/tom/github/oqlos/venv/bin/activate && doql -d . -f app.doql.less plan'
      when: always
      
    - name: build
      run: bash -c 'source /home/tom/github/oqlos/venv/bin/activate && doql -d . -f app.doql.less build'
      when: always
      
    - name: test
      run: echo "Tests would run here (test target if configured)"
      optional: true
      when: always
      
  artifacts:
    - path: ./build
      name: build-output
      
  loop:
    max_iterations: 2
    on_fail: report
